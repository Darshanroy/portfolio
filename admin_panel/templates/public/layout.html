<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARSHAN KUMAR - Engineering Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: white;
            color: black;
        }
        .font-mono {
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        }
        
        /* Entrance animation to replace framer-motion */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-white font-sans text-black selection:bg-black selection:text-white">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
            <a href="{{ url_for('public_index') }}" class="font-mono text-sm font-bold tracking-tighter hover:opacity-70 transition-opacity">
                DARSHAN KUMAR
            </a>
            
            <div class="flex gap-6">
                <a href="{{ url_for('public_index') }}#projects" class="text-[10px] font-mono uppercase tracking-widest text-gray-500 hover:text-black transition-colors hidden sm:block">
                    Projects
                </a>
                <a href="{{ url_for('public_blog_list') }}" class="text-[10px] font-mono uppercase tracking-widest text-gray-500 hover:text-black transition-colors">
                    Blog
                </a>
                <a href="{{ url_for('public_achievement_list') }}" class="text-[10px] font-mono uppercase tracking-widest text-gray-500 hover:text-black transition-colors hidden sm:block">
                    Achievements
                </a>
                <a href="mailto:hello@example.com" class="text-[10px] font-mono uppercase tracking-widest text-black hover:text-gray-500 transition-colors">
                    Contact &rarr;
                </a>
            </div>
        </div>
    </nav>
    
    <main class="fade-in-up">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-100 py-12 mt-20">
        <div class="mx-auto max-w-5xl px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-[10px] font-mono uppercase tracking-widest text-gray-400">
                &copy; 2026 DARSHAN KUMAR. All rights reserved.
            </div>
            <div class="flex gap-6">
                <a href="#" class="text-[10px] font-mono uppercase tracking-widest text-gray-400 hover:text-black transition-colors">Twitter</a>
                <a href="#" class="text-[10px] font-mono uppercase tracking-widest text-gray-400 hover:text-black transition-colors">GitHub</a>
                <a href="#" class="text-[10px] font-mono uppercase tracking-widest text-gray-400 hover:text-black transition-colors">LinkedIn</a>
            </div>
        </div>
    </footer>
</body>
</html>
