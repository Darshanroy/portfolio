<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - DARSHAN KUMAR</title>
    <!-- Tailwind CSS (CDN for simplicity in Admin Panel) -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: white;
            color: black;
        }
        .font-mono {
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        }
    </style>
</head>
<body class="min-h-screen bg-white font-sans text-black selection:bg-black selection:text-white">
    <!-- Navigation replicated from React Component -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
            <a href="{{ url_for('admin_index') }}" class="font-mono text-sm font-bold tracking-tighter hover:opacity-70 transition-opacity">
                DARSHAN KUMAR <span class="text-xs text-gray-400 font-normal">| ADMIN</span>
            </a>
            
            <div class="flex gap-6">
                <a href="{{ url_for('admin_index') }}" class="text-[10px] font-mono uppercase tracking-widest text-gray-500 hover:text-black transition-colors">
                    Dashboard
                </a>
                <a href="{{ url_for('new_project') }}" class="text-[10px] font-mono uppercase tracking-widest text-gray-500 hover:text-black transition-colors">
                    New Project
                </a>
                <a href="{{ url_for('public_index') }}" target="_blank" class="text-[10px] font-mono uppercase tracking-widest text-blue-500 hover:text-blue-700 transition-colors">
                    View Site &nearr;
                </a>
            </div>
        </div>
    </nav>
    
    <main class="mx-auto max-w-5xl px-6 py-12">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
